<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meeting Waiting Screen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="aurora aurora-a"></div>
      <div class="aurora aurora-b"></div>
      <div class="grid-overlay" aria-hidden="true"></div>

      <section class="panel config-panel" id="configPanel">
        <p class="eyebrow">Meeting Room</p>
        <h1 id="titlePreview">Weekly Sync Starts Soon</h1>
        <p class="subtitle">
          Twitch-style "starting soon" look inspired by your reference video.
          Configure your title and timer, then press start.
        </p>

        <form id="configForm" class="form-grid" autocomplete="off">
          <label>
            Meeting title
            <input
              id="meetingTitle"
              type="text"
              maxlength="70"
              value="Weekly Sync Starts Soon"
              placeholder="Type your meeting title"
              required
            />
          </label>

          <label>
            Countdown (minutes)
            <input
              id="meetingMinutes"
              type="number"
              min="1"
              max="180"
              value="5"
              required
            />
          </label>

          <button id="startBtn" type="submit">Start Waiting Screen</button>
        </form>
      </section>

      <section class="panel waiting-panel hidden" id="waitingPanel">
        <div class="live-chip" aria-hidden="true"><span></span> LIVE EVENT</div>
        <p class="badge">Starting in</p>
        <h2 id="meetingTitleDisplay" class="waiting-title">Weekly Sync Starts Soon</h2>

        <div class="countdown-stage">
          <p id="countdownDisplay" class="timer" aria-live="polite">
            <span class="digit" data-digit="m1">0</span>
            <span class="digit" data-digit="m2">5</span>
            <span class="colon">:</span>
            <span class="digit" data-digit="s1">0</span>
            <span class="digit" data-digit="s2">0</span>
          </p>
        </div>

        <div class="progress-bar-wrap" aria-hidden="true">
          <div class="progress-bar" id="barProgress"></div>
        </div>

        <p class="ticker" id="tickerText">
          Stream intro mode active • Audio check • Camera check • Screen share ready
        </p>

        <button id="resetBtn" type="button" class="ghost">Back to setup</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
